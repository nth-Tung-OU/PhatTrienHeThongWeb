<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body>

    <nav th:fragment="navbar" class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <span class="text-2xl font-bold text-green-600">Spring</span>
                    <span class="text-2xl font-bold text-slate-700">Code</span>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="/" class="hover:text-green-600 font-medium transition">Home</a>
                    <a href="#" class="hover:text-green-600 font-medium transition">Features</a>
                </div>
                <div class="flex gap-4">
                    <a href="/login" class="px-4 py-2 text-sm font-medium hover:text-green-600 transition">Login</a>
                    <a href="/register" class="px-4 py-2 text-sm font-medium bg-green-600 text-white rounded-lg hover:bg-green-700 transition">Get Started</a>
                </div>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="bg-slate-900 text-slate-400 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>© 2026 SpringCode. Built with Love and Java.</p>
        </div>
    </footer>

</body>
</html>
